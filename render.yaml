# Shop Inventory — Render Blueprint (single Web service + Postgres)
# Docs: https://render.com/docs/infrastructure-as-code
#
# After the first successful deploy:
# 1. In the web service → Environment, set PUBLIC_APP_URL to this service’s URL (e.g. https://shop-inventory-xxxx.onrender.com).
# 2. Seed sample data + admin (from your machine): DATABASE_URL="<from Render Postgres>" npm run db:seed -w server
#    Default admin: admin@example.com / admin123 — change the password after login.
# 3. Optional: SMTP_* + EMAIL_FROM for forgot-password emails (otherwise reset returns 503 in production).
#
# Free web instances spin down when idle (cold starts). Use a paid instance for always-on.
# Free Postgres is for testing; use a paid plan for production.

databases:
  - name: shop-inventory-db
    plan: free
    databaseName: shop_inventory

services:
  - type: web
    name: shop-inventory
    runtime: node
    plan: free
    rootDir: .
    # Include devDependencies so client/server TypeScript + Vite builds succeed even when NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: shop-inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
